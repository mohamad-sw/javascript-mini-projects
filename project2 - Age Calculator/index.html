<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-900 via-indigo-900 to-blue-900 flex items-center justify-center p-4">

  <div class="bg-white/10 backdrop-blur-sm rounded-3xl p-8 md:p-12 max-w-md w-full border border-white/20 shadow-2xl">

    <h1 class="text-white text-3xl font-bold text-center mb-1">Age Calculator 🎂</h1>
    <p class="text-purple-200 text-center text-sm mb-8 opacity-70">Find out exactly how old you are!</p>

    <!-- Birthday input -->
    <label class="text-purple-200 text-sm font-medium block mb-2">Your Birthday</label>
    <input
      type="date"
      id="birthday"
      class="w-full bg-white/20 border border-white/30 rounded-xl px-4 py-3 text-white text-lg focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-400/50 mb-6"
    >

    <!-- Button -->
    <button
      onclick="calculateAge()"
      class="w-full bg-purple-500 hover:bg-purple-400 text-white font-bold text-lg py-4 rounded-xl transition-all duration-200 hover:scale-105 active:scale-95 shadow-lg"
    >
      Calculate My Age
    </button>

    <!-- Result (hidden until calculated) -->
    <div id="result" class="hidden mt-8">
      <div class="border-t border-white/20 pt-8">

        <p class="text-purple-200 text-center text-sm mb-6">You are exactly:</p>

        <!-- Three boxes: years / months / days -->
        <div class="grid grid-cols-3 gap-4 text-center">
          <div class="bg-purple-500/30 rounded-2xl p-4">
            <div id="years"  class="text-white text-4xl font-black">0</div>
            <div class="text-purple-200 text-sm mt-1">Years</div>
          </div>
          <div class="bg-indigo-500/30 rounded-2xl p-4">
            <div id="months" class="text-white text-4xl font-black">0</div>
            <div class="text-purple-200 text-sm mt-1">Months</div>
          </div>
          <div class="bg-blue-500/30 rounded-2xl p-4">
            <div id="days"   class="text-white text-4xl font-black">0</div>
            <div class="text-purple-200 text-sm mt-1">Days</div>
          </div>
        </div>

        <!-- Fun fact -->
        <p id="fun-fact" class="text-purple-300 text-center mt-6 text-sm opacity-80"></p>
      </div>
    </div>

  </div>

  <script>
    function calculateAge() {
      const input = document.getElementById('birthday').value;

      // Make sure the user picked a date
      if (!input) {
        alert('Please enter your birthday!');
        return;
      }

      const birthday = new Date(input);
      const today    = new Date();

      if (birthday > today) {
        alert('Birthday cannot be in the future!');
        return;
      }

      // ── Calculate years, months, remaining days ───────────
      let years  = today.getFullYear() - birthday.getFullYear();
      let months = today.getMonth()    - birthday.getMonth();
      let days   = today.getDate()     - birthday.getDate();

      // If days went negative, borrow a month
      if (days < 0) {
        months--;
        // How many days are in the previous month?
        const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
        days += prevMonth.getDate();
      }

      // If months went negative, borrow a year
      if (months < 0) {
        years--;
        months += 12;
      }

      // ── Display ───────────────────────────────────────────
      document.getElementById('years').textContent  = years;
      document.getElementById('months').textContent = months;
      document.getElementById('days').textContent   = days;

      // Total days lived (fun fact)
      const totalDays = Math.floor((today - birthday) / (1000 * 60 * 60 * 24));
      document.getElementById('fun-fact').textContent =
        `You have lived ${totalDays.toLocaleString()} days in total! 🚀`;

      document.getElementById('result').classList.remove('hidden');
    }
  </script>
</body>
</html>
