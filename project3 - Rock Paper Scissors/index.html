<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-orange-900 via-red-900 to-pink-900 flex items-center justify-center p-4">

  <div class="max-w-lg w-full">

    <h1 class="text-white text-4xl font-black text-center mb-1">Rock Paper Scissors</h1>
    <p class="text-orange-200 text-center mb-8 opacity-70">Pick your weapon!</p>

    <!-- Score board -->
    <div class="flex justify-center gap-6 mb-8">
      <div class="bg-white/10 rounded-2xl px-8 py-4 text-center border border-white/20">
        <div id="player-score" class="text-white text-5xl font-black">0</div>
        <div class="text-orange-200 text-sm mt-1">You</div>
      </div>
      <div class="flex items-center px-4">
        <div class="text-white/40 text-2xl font-bold">VS</div>
      </div>
      <div class="bg-white/10 rounded-2xl px-8 py-4 text-center border border-white/20">
        <div id="computer-score" class="text-white text-5xl font-black">0</div>
        <div class="text-orange-200 text-sm mt-1">Computer</div>
      </div>
    </div>

    <!-- Choice buttons -->
    <div class="flex justify-center gap-3 md:gap-4 mb-8">
      <button onclick="play('rock')"
        class="bg-white/10 hover:bg-orange-500/40 border-2 border-white/20 hover:border-orange-400 rounded-2xl p-4 md:p-6 text-5xl md:text-6xl transition-all duration-200 hover:scale-110 active:scale-95">
        🪨
      </button>
      <button onclick="play('paper')"
        class="bg-white/10 hover:bg-orange-500/40 border-2 border-white/20 hover:border-orange-400 rounded-2xl p-4 md:p-6 text-5xl md:text-6xl transition-all duration-200 hover:scale-110 active:scale-95">
        📄
      </button>
      <button onclick="play('scissors')"
        class="bg-white/10 hover:bg-orange-500/40 border-2 border-white/20 hover:border-orange-400 rounded-2xl p-4 md:p-6 text-5xl md:text-6xl transition-all duration-200 hover:scale-110 active:scale-95">
        ✂️
      </button>
    </div>

    <!-- Battle result (hidden until a round is played) -->
    <div id="battle" class="hidden bg-white/10 rounded-3xl p-6 border border-white/20 text-center mb-4">
      <div class="flex justify-around items-center mb-4">
        <div>
          <div id="player-choice"   class="text-7xl">❓</div>
          <div class="text-orange-200 text-sm mt-2">Your choice</div>
        </div>
        <div class="text-white text-3xl">⚡</div>
        <div>
          <div id="computer-choice" class="text-7xl">❓</div>
          <div class="text-orange-200 text-sm mt-2">Computer</div>
        </div>
      </div>
      <div id="result-text" class="text-2xl font-black text-white"></div>
    </div>

    <!-- Reset button -->
    <button onclick="resetGame()"
      class="w-full bg-white/10 hover:bg-white/20 text-white/60 hover:text-white py-3 rounded-xl border border-white/20 transition-all text-sm">
      Reset Scores
    </button>

  </div>

  <script>
    // Emoji map for each choice
    const EMOJIS = { rock: '🪨', paper: '📄', scissors: '✂️' };

    // Win conditions: key beats value
    const BEATS = { rock: 'scissors', paper: 'rock', scissors: 'paper' };

    let playerScore   = 0;
    let computerScore = 0;

    function play(playerChoice) {
      // Computer picks randomly from the three options
      const choices        = ['rock', 'paper', 'scissors'];
      const computerChoice = choices[Math.floor(Math.random() * choices.length)];

      // Show both choices
      document.getElementById('player-choice').textContent   = EMOJIS[playerChoice];
      document.getElementById('computer-choice').textContent = EMOJIS[computerChoice];
      document.getElementById('battle').classList.remove('hidden');

      // Decide the winner
      let resultText;
      if (playerChoice === computerChoice) {
        resultText = "🤝 It's a Tie!";
      } else if (BEATS[playerChoice] === computerChoice) {
        resultText = '🎉 You Win!';
        playerScore++;
        document.getElementById('player-score').textContent = playerScore;
      } else {
        resultText = '😢 Computer Wins!';
        computerScore++;
        document.getElementById('computer-score').textContent = computerScore;
      }

      document.getElementById('result-text').textContent = resultText;
    }

    function resetGame() {
      playerScore   = 0;
      computerScore = 0;
      document.getElementById('player-score').textContent   = 0;
      document.getElementById('computer-score').textContent = 0;
      document.getElementById('battle').classList.add('hidden');
    }
  </script>
</body>
</html>
