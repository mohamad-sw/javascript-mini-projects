<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center p-4">

  <div class="bg-gray-900 rounded-3xl p-8 max-w-md w-full border border-blue-500/20 shadow-2xl">

    <!-- Header -->
    <div class="flex items-center gap-3 mb-6">
      <span class="text-4xl">🔐</span>
      <div>
        <h1 class="text-white text-2xl font-bold">Password Generator</h1>
        <p class="text-gray-400 text-sm">Create strong passwords instantly</p>
      </div>
    </div>

    <!-- Password display + copy button -->
    <div class="flex items-center gap-2 bg-gray-800 rounded-xl px-4 py-3 mb-6 border border-gray-700">
      <code id="password-display" class="text-green-400 text-lg font-mono flex-1 break-all">
        Click Generate!
      </code>
      <button
        onclick="copyPassword()"
        id="copy-btn"
        title="Copy to clipboard"
        class="text-gray-400 hover:text-white transition-colors flex-shrink-0 text-xl p-1"
      >📋</button>
    </div>

    <!-- Length slider -->
    <div class="mb-6">
      <div class="flex justify-between text-sm mb-2">
        <span class="text-gray-400">Password Length</span>
        <span id="length-value" class="text-blue-400 font-bold">16</span>
      </div>
      <input
        type="range"
        id="length-slider"
        min="6" max="32" value="16"
        oninput="document.getElementById('length-value').textContent = this.value"
        class="w-full accent-blue-500"
      >
      <div class="flex justify-between text-xs text-gray-600 mt-1">
        <span>6</span><span>32</span>
      </div>
    </div>

    <!-- Character type checkboxes -->
    <div class="space-y-3 mb-6">
      <p class="text-gray-400 text-sm font-medium">Include:</p>

      <label class="flex items-center gap-3 cursor-pointer group">
        <input type="checkbox" id="uppercase" checked class="w-4 h-4 accent-blue-500">
        <span class="text-gray-300 group-hover:text-white transition-colors">Uppercase Letters (A–Z)</span>
      </label>

      <label class="flex items-center gap-3 cursor-pointer group">
        <input type="checkbox" id="lowercase" checked class="w-4 h-4 accent-blue-500">
        <span class="text-gray-300 group-hover:text-white transition-colors">Lowercase Letters (a–z)</span>
      </label>

      <label class="flex items-center gap-3 cursor-pointer group">
        <input type="checkbox" id="numbers" checked class="w-4 h-4 accent-blue-500">
        <span class="text-gray-300 group-hover:text-white transition-colors">Numbers (0–9)</span>
      </label>

      <label class="flex items-center gap-3 cursor-pointer group">
        <input type="checkbox" id="symbols" class="w-4 h-4 accent-blue-500">
        <span class="text-gray-300 group-hover:text-white transition-colors">Symbols (!@#$%^&amp;*)</span>
      </label>
    </div>

    <!-- Generate button -->
    <button
      onclick="generatePassword()"
      class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold text-lg py-4 rounded-xl transition-all hover:scale-105 active:scale-95 shadow-lg shadow-blue-500/20"
    >
      Generate Password
    </button>

  </div>

  <script>
    // Character pools
    const UPPERCASE = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const LOWERCASE = 'abcdefghijklmnopqrstuvwxyz';
    const NUMBERS   = '0123456789';
    const SYMBOLS   = '!@#$%^&*()_+-=[]{}|;:,.<>?';

    function generatePassword() {
      // Build the pool from whatever checkboxes are ticked
      let pool = '';
      if (document.getElementById('uppercase').checked) pool += UPPERCASE;
      if (document.getElementById('lowercase').checked) pool += LOWERCASE;
      if (document.getElementById('numbers').checked)   pool += NUMBERS;
      if (document.getElementById('symbols').checked)   pool += SYMBOLS;

      if (pool === '') {
        alert('Please select at least one character type!');
        return;
      }

      const length = parseInt(document.getElementById('length-slider').value);
      let password = '';

      // Pick a random character from the pool, repeat <length> times
      for (let i = 0; i < length; i++) {
        const randomIndex = Math.floor(Math.random() * pool.length);
        password += pool[randomIndex];
      }

      document.getElementById('password-display').textContent = password;
      document.getElementById('copy-btn').textContent = '📋';
    }

    function copyPassword() {
      const text = document.getElementById('password-display').textContent;
      if (text === 'Click Generate!') return;

      // navigator.clipboard writes to the system clipboard
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = '✅';
        setTimeout(() => btn.textContent = '📋', 2000);
      });
    }
  </script>
</body>
</html>
